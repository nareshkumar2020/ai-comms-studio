name: Deploy Frontend
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**' # Only trigger if the frontend folder changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install and Build
        run: |
          cd frontend
          npm install
          npm run build
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist # Path to your build folder