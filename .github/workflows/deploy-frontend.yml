name: Deploy Frontend
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**' # Only trigger if the frontend folder changes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read     # Used by checkout
      pages: write       # Required to deploy to GitHub Pages
      id-token: write    # Required for authentication
    steps:
      - uses: actions/checkout@v4
      
      - name: Install and Build
        run: |
          cd frontend
          npm install
          npm run build
        env:
          # This maps the GitHub Secret to an environment variable 
          # that Vite will pick up during the build process
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/dist' # This points to your built files

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4